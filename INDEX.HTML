<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV APP + IMPRESSÃO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;background:#0b1220;color:#fff;margin:0}
header{background:#020617;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#111827;padding:15px;margin-bottom:15px;border-radius:10px}
input,select,button{padding:10px;margin:5px;border-radius:5px;border:none}
button{background:#22c55e;color:#000;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>
<header>
<h2>PDV APP + IMPRESSÃO</h2>
</header>

<div class="container">

<div id="loginCard" class="card">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar Conta</button>
</div>

<div id="sistema" class="hidden">

<div class="card">
<h3>Venda</h3>
<input id="cliente" placeholder="Cliente">
<select id="produtos"></select>
<input id="qtd" type="number" placeholder="Qtd">
<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>
<button onclick="addCarrinho()">Adicionar</button>

<div id="carrinho"></div>
<h3>Total: R$ <span id="total">0.00</span></h3>
<button onclick="finalizarVenda()">Finalizar Venda</button>
<button onclick="imprimir()">🧾 Imprimir Cupom</button>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

</div>

</div>

<script>
const firebaseConfig = {
apiKey: "SUA_KEY",
authDomain: "SEU_APP.firebaseapp.com",
projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let carrinho = [];

function registrar(){
auth.createUserWithEmailAndPassword(email.value, senha.value);
}

function login(){
auth.signInWithEmailAndPassword(email.value, senha.value)
.then(()=>{
loginCard.classList.add('hidden');
sistema.classList.remove('hidden');
carregarProdutos();
});
}

async function carregarProdutos(){
produtos.innerHTML='';
let snap = await db.collection('produtos').get();
snap.forEach(doc=>{
let p = doc.data();
let opt=document.createElement('option');
opt.value=doc.id;
opt.textContent=p.nome+' - '+p.preco;
produtos.appendChild(opt);
});
}

async function addCarrinho(){
let doc = await db.collection('produtos').doc(produtos.value).get();
let p = doc.data();
let q = +qtd.value;

carrinho.push({nome:p.nome,qtd:q,total:p.preco*q});
render();
}

function render(){
let html='';
let total=0;
carrinho.forEach(i=>{
total+=i.total;
html+=`${i.nome} x${i.qtd} = R$ ${i.total}<br>`;
});
carrinho.innerHTML=html;
document.getElementById('total').innerText=total.toFixed(2);
}

async function finalizarVenda(){
let totalVenda = carrinho.reduce((s,i)=>s+i.total,0);
await db.collection('vendas').add({
cliente:cliente.value,
pagamento:pagamento.value,
total:totalVenda
});
carrinho=[];
render();
atualizarGrafico();
}

function imprimir(){
let conteudo = '*** CUPOM ***\n';
carrinho.forEach(i=>{
conteudo += `${i.nome} x${i.qtd} - R$ ${i.total}\n`;
});
conteudo += 'Total: R$ '+total.innerText;

let win = window.open('', '', 'width=300,height=400');
win.document.write('<pre>'+conteudo+'</pre>');
win.print();
}

async function atualizarGrafico(){
let dados={Pix:0,Dinheiro:0,Cartão:0};
let snap = await db.collection('vendas').get();
snap.forEach(doc=>{
let v=doc.data();
dados[v.pagamento]+=v.total;
});

new Chart(grafico,{type:'bar',data:{labels:Object.keys(dados),datasets:[{data:Object.values(dados)}]}});
}

// SERVICE WORKER (APP)
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
